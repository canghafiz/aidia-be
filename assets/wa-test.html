<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WhatsApp Connect & Chat Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    #header { background: #1f1f1f; padding: 12px 16px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    #header h2 { font-size: 16px; }
    #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; flex-shrink: 0; }
    #status-dot.connected { background: #4caf50; }
    #status-text { font-size: 12px; color: #888; }
    button { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; }

    /* ── WA Connect Panel ── */
    #wa-panel { background: #161616; padding: 20px; border-bottom: 1px solid #333; flex-shrink: 0; }
    #wa-panel h3 { font-size: 13px; color: #aaa; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .field-row input, .field-row select { flex: 1; background: #2a2a2a; border: 1px solid #444; color: #eee; padding: 7px 10px; border-radius: 6px; font-size: 12px; }
    .field-row input::placeholder { color: #666; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
    #btnDirectConnect { background: #0e639c; color: #fff; }
    #btnDirectConnect:hover { background: #1177bb; }
    #btnDisconnectWA  { background: #5a1a1a; color: #fff; }
    #btnStatus { background: #333; color: #eee; }
    #wa-status-msg { font-size: 12px; padding: 6px 12px; border-radius: 6px; display: none; }
    #wa-status-msg.success { background: #1a3a1a; color: #6fcf6f; border: 1px solid #2a5a2a; }
    #wa-status-msg.error   { background: #3a1a1a; color: #cf6f6f; border: 1px solid #5a2a2a; }
    #wa-status-msg.info    { background: #1a2a3a; color: #6fafcf; border: 1px solid #2a4a6a; }
    .collapse-toggle { font-size: 11px; color: #666; cursor: pointer; margin-left: auto; user-select: none; }
    .collapse-toggle:hover { color: #aaa; }
    #wa-fields { transition: max-height 0.3s ease; overflow: hidden; }

    /* ── SSE Config ── */
    #config { background: #1a1a1a; padding: 12px 16px; border-bottom: 1px solid #333; flex-shrink: 0; }
    #config input { background: #2a2a2a; border: 1px solid #444; color: #eee; padding: 6px 10px; border-radius: 6px; font-size: 12px; width: 100%; margin-bottom: 6px; }
    #config .row { display: flex; gap: 8px; }
    #config .row input { flex: 1; }
    #config select { background: #2a2a2a; border: 1px solid #444; color: #eee; padding: 6px 10px; border-radius: 6px; font-size: 12px; }
    .sse-btn-row { display: flex; gap: 6px; margin-top: 4px; }
    #btnConnect     { background: #0e639c; color: #fff; }
    #btnSSEDisconnect { background: #5a1a1a; color: #fff; }
    #btnClear       { background: #333; color: #eee; }

    /* ── Chat bubbles ── */
    #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .msg .meta  { font-size: 11px; margin-top: 4px; opacity: 0.6; text-align: right; }
    .msg .badge { font-size: 10px; font-weight: 600; margin-bottom: 2px; opacity: 0.7; }
    .msg-user     { background: #2a3d2a; align-self: flex-start; border-bottom-left-radius: 3px; }
    .msg-bot      { background: #1a2a3d; align-self: flex-end;   border-bottom-right-radius: 3px; }
    .msg-operator { background: #3d2a1a; align-self: flex-end;   border-bottom-right-radius: 3px; }

    /* ── Conversations list ── */
    #conv-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .conv-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #222; cursor: pointer; transition: background 0.15s; }
    .conv-item:hover { background: #1e1e1e; }
    .conv-avatar { width: 44px; height: 44px; border-radius: 50%; background: #2a4a6a; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .conv-body { flex: 1; min-width: 0; }
    .conv-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview.unread { color: #4caf50; font-weight: 500; }
    .conv-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .conv-time  { font-size: 11px; color: #666; }
    .conv-badge { background: #4caf50; color: #fff; font-size: 10px; font-weight: 700; border-radius: 10px; padding: 1px 6px; min-width: 18px; text-align: center; }
    #conv-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #555; font-size: 14px; }

    /* ── Raw log ── */
    #log-raw { background: #0a0a0a; border-top: 1px solid #333; height: 120px; overflow-y: auto; padding: 8px 12px; font-size: 11px; font-family: monospace; color: #666; flex-shrink: 0; display: none; }
    #log-raw .raw-line { margin-bottom: 2px; }
    #log-raw .raw-line span { color: #888; }

    /* ── Footer ── */
    #footer { background: #1a1a1a; padding: 8px 12px; border-top: 1px solid #333; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    #toggleRaw  { background: #222; color: #888; font-size: 11px; padding: 4px 10px; }
    #mode-label { font-size: 11px; color: #555; margin-left: auto; }

    #btnConnect2WA { background: #25d366; color: #fff; font-size: 14px; padding: 8px 20px; }
    #btnConnect2WA:hover { background: #1fb855; }
    #btnConnect2WA:disabled { background: #1a4a2a; color: #555; cursor: not-allowed; }
    #wa-info { font-size: 12px; color: #6fcf6f; background: #1a3a1a; border: 1px solid #2a5a2a; border-radius: 6px; padding: 8px 12px; margin-top: 8px; display: none; }
  </style>
</head>
<body>

<!-- ══════════════════════ HEADER ══════════════════════ -->
<div id="header">
  <div id="status-dot"></div>
  <h2>WhatsApp Connect & Chat Test</h2>
  <span id="status-text">Disconnected</span>
  <div style="margin-left:auto; display:flex; gap:6px;">
    <button id="btnConnect" onclick="sseConnect()">Connect SSE</button>
    <button id="btnSSEDisconnect" onclick="sseDisconnect()">Disconnect</button>
    <button id="btnClear" onclick="clearAll()">Clear</button>
  </div>
</div>

<!-- ══════════════════════ WA CONNECT PANEL ══════════════════════ -->
<div id="wa-panel">
  <div style="display:flex; align-items:center; margin-bottom:10px;">
    <h3 style="margin:0">🔗 WhatsApp Connection</h3>
    <span class="collapse-toggle" onclick="toggleWAPanel()">▲ Collapse</span>
  </div>
  <div id="wa-fields">
    <div class="field-row">
      <input id="waBaseUrl" placeholder="Base URL (e.g. https://xxxx.ngrok-free.app)" value="">
    </div>
    <div class="field-row">
      <input id="waClientId" placeholder="Client ID (UUID)">
      <input id="waToken" placeholder="JWT Token">
    </div>

    <div id="wa-info"></div>

    <div class="btn-row" style="margin-top:12px">
      <button id="btnConnect2WA" onclick="launchEmbeddedSignup()" disabled>⏳ Memuat SDK...</button>
      <button id="btnStatus" onclick="checkWAStatus()">📡 Cek Status</button>
      <button id="btnDisconnectWA" onclick="disconnectWA()">✂️ Disconnect WA</button>
    </div>

    <div id="wa-status-msg"></div>
  </div>
</div>

<!-- ══════════════════════ SSE CONFIG ══════════════════════ -->
<div id="config">
  <div class="row">
    <input id="sseBaseUrl" placeholder="Base URL" value="">
    <input id="clientId" placeholder="Client ID" value="">
    <select id="platform">
      <option value="whatsapp">whatsapp</option>
      <option value="telegram">telegram</option>
    </select>
  </div>
  <div class="row" style="margin-top:6px">
    <input id="guestId" placeholder="Guest ID (kosongkan = list view)">
  </div>
  <input id="token" placeholder="JWT Token" style="margin-top:6px">
  <div class="sse-btn-row">
  </div>
</div>

<!-- ══════════════════════ CONTENT ══════════════════════ -->
<div id="chat" style="display:none"></div>
<div id="conv-list" style="display:none">
  <div id="conv-empty">No conversations yet</div>
</div>

<!-- ══════════════════════ FOOTER ══════════════════════ -->
<div id="footer">
  <button id="toggleRaw" onclick="toggleRaw()">Show Raw Events</button>
  <span id="mode-label"></span>
</div>
<div id="log-raw"></div>

<script>
  // ── State ────────────────────────────────────────────────────
  let es = null;
  let sseMode = 'none'; // 'list' | 'detail'
  const convMap = new Map();
  let waPanelCollapsed = false;
  let _embeddedSignupResult = null; // { waba_id, phone_number_id } dari message event Meta

  // ── FB SDK ───────────────────────────────────────────────────
  let _fbSdkReady = false;
  let _metaAppId  = '';
  let _metaConfigId = '';

  window.fbAsyncInit = function() {
    // FB SDK loaded — app_id diisi nanti saat launchEmbeddedSignup via FB.init() ulang
    _fbSdkReady = true;
    document.getElementById('btnConnect2WA').disabled = false;
    document.getElementById('btnConnect2WA').textContent = '🟢 Connect WhatsApp';
  };

  // Inject FB SDK script
  (function(d, s, id) {
    if (d.getElementById(id)) return;
    const js = d.createElement(s); js.id = id;
    js.src = 'https://connect.facebook.net/en_US/sdk.js';
    d.getElementsByTagName('head')[0].appendChild(js);
  }(document, 'script', 'facebook-jssdk'));

  // Tangkap WABA ID + Phone Number ID dari popup Meta
  window.addEventListener('message', function(e) {
    if (e.origin !== 'https://www.facebook.com') return;
    try {
      const data = JSON.parse(e.data);
      if (data.type !== 'WA_EMBEDDED_SIGNUP') return;
      if (data.event === 'FINISH') {
        _embeddedSignupResult = {
          waba_id:         data.data.waba_id,
          phone_number_id: data.data.phone_number_id,
        };
        showWAMsg(`✅ Akun dipilih: WABA ${data.data.waba_id} — menyimpan...`, 'info');
      } else if (data.event === 'CANCEL') {
        showWAMsg('⚠️ Dibatalkan', 'info');
      } else if (data.event === 'ERROR') {
        showWAMsg('❌ Error Meta: ' + (data.data?.error_message || ''), 'error');
      }
    } catch {}
  });

  window.addEventListener('load', () => { syncFieldsToSSE(); });

  // ── WA Panel: Embedded Signup ────────────────────────────────
  async function launchEmbeddedSignup() {
    const base     = getWABase();
    const clientId = document.getElementById('waClientId').value.trim();
    const token    = document.getElementById('waToken').value.trim();
    if (!base || !clientId || !token) {
      showWAMsg('⚠️ Isi Base URL, Client ID, dan JWT Token dulu', 'error'); return;
    }

    // Ambil config dari backend jika belum ada
    if (!_metaAppId || !_metaConfigId) {
      try {
        const cfg = await fetch(`${base}/api/v1/whatsapp/config`).then(r => r.json());
        _metaAppId    = cfg.data?.app_id    || '';
        _metaConfigId = cfg.data?.config_id || '';
      } catch (e) {
        showWAMsg('❌ Gagal fetch config backend: ' + e.message, 'error'); return;
      }
    }

    if (!_metaAppId)    { showWAMsg('❌ META_APP_ID belum dikonfigurasi di backend', 'error'); return; }
    if (!_metaConfigId) { showWAMsg('❌ META_EMBEDDED_SIGNUP_CONFIG_ID belum diisi di backend .env', 'error'); return; }

    // Init FB dengan appId yang benar (boleh dipanggil berulang)
    FB.init({ appId: _metaAppId, version: 'v21.0', cookie: true, xfbml: false });

    _embeddedSignupResult = null;

    FB.login(function(response) {
      if (!response.authResponse?.code) {
        if (!_embeddedSignupResult) showWAMsg('⚠️ Login dibatalkan atau gagal', 'error');
        return;
      }
      const code = response.authResponse.code;

      // Tunggu sebentar untuk pastikan message event sudah masuk, lalu kirim ke backend
      setTimeout(function() {
        if (!_embeddedSignupResult) {
          showWAMsg('❌ Data WABA tidak diterima dari Meta', 'error'); return;
        }
        showWAMsg('⏳ Menyimpan koneksi...', 'info');
        fetch(`${base}/api/v1/client/${clientId}/whatsapp/connect`, {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            code:            code,
            waba_id:         _embeddedSignupResult.waba_id,
            phone_number_id: _embeddedSignupResult.phone_number_id,
          })
        })
        .then(r => r.json())
        .then(data => {
          if (!data.success) throw new Error(data.message || 'Gagal');
          const d = data.data;
          showWAMsg(`✅ Terhubung! ${d.display_name} (${d.phone_number})`, 'success');
          showWAInfo(`📱 ${d.display_name} &nbsp;|&nbsp; ${d.phone_number} &nbsp;|&nbsp; WABA: ${d.waba_id}`);
          syncFieldsToSSE();
        })
        .catch(e => showWAMsg('❌ ' + e.message, 'error'));
      }, 500);
    }, {
      config_id:                     _metaConfigId,
      response_type:                 'code',
      override_default_response_type: true,
      extras: { sessionInfoVersion: 2 }
    });
  }

  // ── WA Panel: Check Status ───────────────────────────────────
  async function checkWAStatus() {
    const base     = getWABase();
    const clientId = document.getElementById('waClientId').value.trim();
    const token    = document.getElementById('waToken').value.trim();
    if (!base || !clientId || !token) {
      showWAMsg('⚠️ Isi Base URL, Client ID, dan JWT Token', 'error'); return;
    }
    showWAMsg('⏳ Mengecek status...', 'info');
    try {
      const res  = await fetch(`${base}/api/v1/client/${clientId}/whatsapp/status`, {
        headers: { Authorization: 'Bearer ' + token }
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      const d = data.data;
      if (d.connected) {
        showWAMsg(`✅ Terhubung: ${d.display_name} (${d.phone_number})`, 'success');
        showWAInfo(`📱 ${d.display_name} &nbsp;|&nbsp; ${d.phone_number} &nbsp;|&nbsp; ID: ${d.phone_number_id}`);
      } else {
        showWAMsg('🔌 Belum terhubung', 'info');
        document.getElementById('wa-info').style.display = 'none';
      }
    } catch (e) {
      showWAMsg('❌ ' + e.message, 'error');
    }
  }

  // ── WA Panel: Disconnect ─────────────────────────────────────
  async function disconnectWA() {
    const base     = getWABase();
    const clientId = document.getElementById('waClientId').value.trim();
    const token    = document.getElementById('waToken').value.trim();
    if (!base || !clientId || !token) {
      showWAMsg('⚠️ Isi Base URL, Client ID, dan JWT Token', 'error'); return;
    }
    if (!confirm('Putuskan koneksi WhatsApp?')) return;
    showWAMsg('⏳ Memutuskan koneksi...', 'info');
    try {
      const res  = await fetch(`${base}/api/v1/client/${clientId}/whatsapp/disconnect`, {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + token }
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      showWAMsg('✂️ Koneksi WhatsApp diputus', 'info');
      document.getElementById('wa-info').style.display = 'none';
    } catch (e) {
      showWAMsg('❌ ' + e.message, 'error');
    }
  }

  // ── SSE Chat ─────────────────────────────────────────────────
  function sseConnect() {
    sseDisconnect();
    const base     = document.getElementById('sseBaseUrl').value.trim();
    const clientId = document.getElementById('clientId').value.trim();
    const guestId  = document.getElementById('guestId').value.trim();
    const platform = document.getElementById('platform').value;
    const token    = document.getElementById('token').value.trim();

    if (!base || !clientId || !token) {
      alert('Isi Base URL, Client ID, dan JWT Token'); return;
    }

    const url = guestId
      ? `${base}/api/v1/client/${clientId}/chats/${platform}/${guestId}?token=${token}`
      : `${base}/api/v1/client/${clientId}/chats/${platform}?token=${token}`;

    sseMode = guestId ? 'detail' : 'list';
    document.getElementById('mode-label').textContent = sseMode === 'list' ? '📋 List mode' : '💬 Detail mode';

    document.getElementById('chat').style.display      = sseMode === 'detail' ? 'flex' : 'none';
    document.getElementById('conv-list').style.display = sseMode === 'list'   ? 'flex' : 'none';
    clearAll();

    es = new EventSource(url);
    es.onopen = () => setSseStatus(true);

    es.addEventListener('init', e => {
      rawLog('init', e.data);
      try {
        const payload = JSON.parse(e.data);
        if (sseMode === 'detail') {
          (payload.messages || []).forEach(m => addBubble(m.message, m.role, m.is_human, m.created_at));
        } else {
          (payload.conversations || []).forEach(c => upsertConv(c.guest_id, c.name, c.last_message, c.last_message_at, false));
        }
      } catch (err) { console.error(err); }
    });

    es.addEventListener('message', e => {
      rawLog('message', e.data);
      try {
        const payload = JSON.parse(e.data);
        const d = payload.data || payload;
        addBubble(d.message, d.role, d.is_human, d.created_at || d.timestamp);
      } catch { }
    });

    es.addEventListener('update', e => {
      rawLog('update', e.data);
      try {
        const payload = JSON.parse(e.data);
        const d = payload.data || payload;
        upsertConv(d.guest_id, d.guest_name, d.message, d.created_at || d.timestamp, true);
      } catch { }
    });

    es.onerror = () => { rawLog('error/close', ''); setSseStatus(false); };
  }

  function sseDisconnect() {
    if (es) { es.close(); es = null; }
    setSseStatus(false);
  }

  function setSseStatus(connected) {
    document.getElementById('status-dot').className    = connected ? 'connected' : '';
    document.getElementById('status-text').textContent = connected ? 'Connected' : 'Disconnected';
  }

  // ── Detail: chat bubbles ─────────────────────────────────────
  function addBubble(text, role, isHuman, ts) {
    const chat = document.getElementById('chat');
    const div  = document.createElement('div');
    let cls, badge;
    if (role === 'user')       { cls = 'msg msg-user';     badge = '👤 Guest'; }
    else if (isHuman)          { cls = 'msg msg-operator'; badge = '🧑‍💼 Operator'; }
    else                       { cls = 'msg msg-bot';      badge = '🤖 Bot / AI'; }
    const time = ts ? new Date(ts).toLocaleTimeString() : '';
    div.className = cls;
    div.innerHTML = `<div class="badge">${badge}</div>${escHtml(text)}<div class="meta">${time}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  // ── List: conversation items ──────────────────────────────────
  function upsertConv(guestId, name, lastMsg, lastAt, isNew) {
    const list = document.getElementById('conv-list');
    document.getElementById('conv-empty').style.display = 'none';
    const time     = lastAt ? fmtTime(lastAt) : '';
    const initials = (name || '?').charAt(0).toUpperCase();
    const preview  = escHtml(lastMsg || '');

    if (convMap.has(guestId)) {
      const { el } = convMap.get(guestId);
      el.querySelector('.conv-preview').innerHTML = preview;
      el.querySelector('.conv-time').textContent  = time;
      if (isNew) {
        const badge = el.querySelector('.conv-badge');
        badge.textContent = parseInt(badge.textContent || '0') + 1;
        badge.style.display = '';
        el.querySelector('.conv-preview').classList.add('unread');
        list.insertBefore(el, list.firstChild);
      }
    } else {
      const el = document.createElement('div');
      el.className      = 'conv-item';
      el.dataset.guestId = guestId;
      el.innerHTML = `
        <div class="conv-avatar">${escHtml(initials)}</div>
        <div class="conv-body">
          <div class="conv-name">${escHtml(name || 'Unknown')}</div>
          <div class="conv-preview ${isNew ? 'unread' : ''}">${preview}</div>
        </div>
        <div class="conv-right">
          <div class="conv-time">${time}</div>
          <div class="conv-badge" style="display:${isNew ? '' : 'none'}">${isNew ? 1 : 0}</div>
        </div>`;
      // Click to open detail
      el.addEventListener('click', () => {
        document.getElementById('guestId').value = guestId;
        sseConnect();
      });
      convMap.set(guestId, { el });
      isNew ? list.insertBefore(el, list.firstChild) : list.appendChild(el);
    }
  }

  // ── Helpers ──────────────────────────────────────────────────
  function getWABase() {
    return document.getElementById('waBaseUrl').value.trim().replace(/\/$/, '');
  }

  function syncFieldsToSSE() {
    // Copy Base URL, Client ID, Token from WA panel to SSE config
    const base     = document.getElementById('waBaseUrl').value.trim();
    const clientId = document.getElementById('waClientId').value.trim();
    const token    = document.getElementById('waToken').value.trim();
    if (base)     document.getElementById('sseBaseUrl').value = base;
    if (clientId) document.getElementById('clientId').value   = clientId;
    if (token)    document.getElementById('token').value      = token;

    // Also restore from localStorage if redirected from OAuth
    const savedBase   = localStorage.getItem('wa_base');
    const savedClient = localStorage.getItem('wa_client');
    const savedToken  = localStorage.getItem('wa_token');
    if (savedBase)   { document.getElementById('waBaseUrl').value = savedBase;   document.getElementById('sseBaseUrl').value = savedBase; }
    if (savedClient) { document.getElementById('waClientId').value = savedClient; document.getElementById('clientId').value   = savedClient; }
    if (savedToken)  { document.getElementById('waToken').value = savedToken;    document.getElementById('token').value      = savedToken; }
    if (savedBase || savedClient || savedToken) {
      localStorage.removeItem('wa_base');
      localStorage.removeItem('wa_client');
      localStorage.removeItem('wa_token');
    }
  }

  // Sync WA fields to SSE whenever WA fields change
  ['waBaseUrl','waClientId','waToken'].forEach(id => {
    document.getElementById(id).addEventListener('input', syncFieldsToSSE);
  });

  function showWAMsg(msg, type) {
    const el = document.getElementById('wa-status-msg');
    el.textContent = msg;
    el.className   = type;
    el.style.display = 'block';
  }

  function showWAInfo(html) {
    const el = document.getElementById('wa-info');
    el.innerHTML     = html;
    el.style.display = 'block';
  }

  function toggleWAPanel() {
    waPanelCollapsed = !waPanelCollapsed;
    const fields  = document.getElementById('wa-fields');
    const toggle  = document.querySelector('.collapse-toggle');
    if (waPanelCollapsed) {
      fields.style.maxHeight = '0';
      toggle.textContent = '▼ Expand';
    } else {
      fields.style.maxHeight = '1000px';
      toggle.textContent = '▲ Collapse';
    }
  }

  function clearAll() {
    document.getElementById('chat').innerHTML = '';
    document.getElementById('conv-list').innerHTML = '<div id="conv-empty">No conversations yet</div>';
    convMap.clear();
  }

  function rawLog(type, data) {
    const div = document.getElementById('log-raw');
    const ts  = new Date().toLocaleTimeString();
    div.innerHTML += `<div class="raw-line"><span>[${ts}] ${type}: </span>${escHtml((data||'').substring(0, 300))}</div>`;
    div.scrollTop = div.scrollHeight;
  }

  function toggleRaw() {
    const el = document.getElementById('log-raw');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
    document.getElementById('toggleRaw').textContent =
      el.style.display === 'none' ? 'Show Raw Events' : 'Hide Raw Events';
  }

  function fmtTime(ts) {
    const d   = new Date(ts);
    const now = new Date();
    return d.toDateString() === now.toDateString()
      ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      : d.toLocaleDateString([], { day: 'numeric', month: 'short' });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
