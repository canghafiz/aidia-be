services:
  backend:
    build: .
    restart: always
    env_file:
      - .env
    command: >
      sh -c "migrate -database 'postgres://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable'
      -path db/migrations up && ./main"

    networks:
      - coolify

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-dia.rule=Host(`data.ai-dia.com`)"
      - "traefik.http.routers.ai-dia.entrypoints=https"
      - "traefik.http.routers.ai-dia.tls.certresolver=letsencrypt"
      - "traefik.http.services.ai-dia.loadbalancer.server.port=8005"
      - "traefik.http.middlewares.ai-dia-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,PATCH,OPTIONS"
      - "traefik.http.middlewares.ai-dia-cors.headers.accesscontrolallowheaders=Origin,Content-Type,Authorization,Accept,X-Requested-With"
      - "traefik.http.middlewares.ai-dia-cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.ai-dia-cors.headers.accesscontrolmaxage=86400"
      - "traefik.http.routers.ai-dia.middlewares=ai-dia-cors"

networks:
  coolify:
    external: true