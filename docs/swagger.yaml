info:
  contact: {}
  description: REST API for AI-Dia application
  title: AI-Dia API
  version: "1.0"
paths:
  /approvals:
    get:
      description: Ambil semua approval logs dengan pagination (Hanya untuk role SuperAdmin)
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helpers.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/pagination.Response'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      security:
      - BearerAuth: []
      tags:
      - Approval
  /approvals/{approval_id}:
    delete:
      description: Hapus approval log berdasarkan approval_id (Hanya untuk role SuperAdmin)
      parameters:
      - description: User ID
        in: path
        name: approval_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      security:
      - BearerAuth: []
      tags:
      - Approval
    patch:
      description: Approve user berdasarkan approval_id (Hanya untuk role SuperAdmin)
      parameters:
      - description: User ID
        in: path
        name: approval_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      security:
      - BearerAuth: []
      tags:
      - Approval
  /auth/change-password:
    patch:
      consumes:
      - application/json
      description: Ganti password user yang sedang login
      parameters:
      - description: Change Password Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.ChangePwRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      security:
      - BearerAuth: []
      tags:
      - Auth
  /auth/check-superadmin-exist:
    get:
      description: Cek apakah SuperAdmin sudah ada di sistem (jika true === ada, tidak
        perlu panggil api create super admin), dipanggil pertama kali sebelum login
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helpers.ApiResponse'
            - properties:
                data:
                  type: boolean
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      tags:
      - Auth
  /auth/create-superadmin:
    post:
      consumes:
      - application/json
      description: Buat akun SuperAdmin, hanya bisa dilakukan sekali
      parameters:
      - description: Create SuperAdmin Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.CreateSuperAdminRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login menggunakan username atau email beserta password
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helpers.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/user.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      tags:
      - Auth
  /auth/me:
    get:
      description: Ambil data user yang sedang login beserta tenant dan business profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helpers.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/user.Response'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      security:
      - BearerAuth: []
      tags:
      - Auth
  /client/{client_id}/delivery-availability-settings:
    get:
      description: Ambil semua pengaturan ketersediaan delivery beserta nama delivery
        yang berelasi
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helpers.ApiResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/delivery_avaibility.DeliveryAvailabilityResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      security:
      - BearerAuth: []
      tags:
      - Delivery Availability Setting
    post:
      consumes:
      - application/json
      description: Buat pengaturan ketersediaan delivery baru, field type=available/not
        available
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      - description: Create Delivery Availability Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/delivery_avaibility.CreateDeliveryAvailabilityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      security:
      - BearerAuth: []
      tags:
      - Delivery Availability Setting
  /client/{client_id}/delivery-availability-settings/{sub_group_name}:
    delete:
      description: Hapus pengaturan ketersediaan delivery berdasarkan sub group name
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      - description: Sub Group Name
        in: path
        name: sub_group_name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      security:
      - BearerAuth: []
      tags:
      - Delivery Availability Setting
    get:
      description: Ambil detail pengaturan ketersediaan delivery berdasarkan sub group
        name
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      - description: Sub Group Name
        in: path
        name: sub_group_name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helpers.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/delivery_avaibility.DeliveryAvailabilityResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
      security:
      - BearerAuth: []
      tags:
      - Delivery Availability Setting
    put:
      consumes:
      - application/json
      description: Update pengaturan ketersediaan delivery berdasarkan sub group name,
        field type=available/not available
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      - description: Sub Group Name
        in: path
        name: sub_group_name
        required: true
        type: string
      - description: Update Delivery Availability Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/delivery_avaibility.UpdateDeliveryAvailabilityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.ApiResponse'
        "401":
          description: Unauthorized
          schema:
