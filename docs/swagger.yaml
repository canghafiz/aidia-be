basePath: /api/v1
definitions:
  delivery.CreateDeliverySettingRequest:
    properties:
      description:
        maxLength: 255
        type: string
      is_visible:
        type: boolean
      name:
        maxLength: 100
        type: string
    required:
    - name
    type: object
  delivery.UpdateDeliverySettingRequest:
    properties:
      description:
        maxLength: 255
        type: string
      is_visible:
        type: boolean
      name:
        maxLength: 100
        type: string
    required:
    - name
    type: object
  delivery_avaibility.CreateDeliveryAvailabilityRequest:
    properties:
      date_range:
        type: string
      delivery_subgroup:
        type: string
      type:
        enum:
        - available
        - unavailable
        type: string
    required:
    - date_range
    - delivery_subgroup
    - type
    type: object
  delivery_avaibility.DeliveryAvailabilityResponse:
    properties:
      date_range:
        type: string
      delivery_name:
        type: string
      delivery_subgroup:
        type: string
      sub_group_name:
        type: string
      type:
        type: string
    type: object
  delivery_avaibility.UpdateDeliveryAvailabilityRequest:
    properties:
      date_range:
        type: string
      delivery_subgroup:
        type: string
      type:
        enum:
        - available
        - unavailable
        type: string
    required:
    - date_range
    - delivery_subgroup
    - type
    type: object
  delivery_setting.DeliverySettingResponse:
    properties:
      description:
        type: string
      is_visible:
        type: boolean
      name:
        type: string
      sub_group_name:
        type: string
    type: object
  domains.BusinessProfile:
    properties:
      address:
        type: string
      businessName:
        type: string
      createdAt:
        type: string
      id:
        type: string
      phone:
        type: string
      tenant:
        allOf:
        - $ref: '#/definitions/domains.Tenant'
        description: Relations
      tenantId:
        type: string
      updatedAt:
        type: string
    type: object
  domains.Roles:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updatedAt:
        type: string
      userRoles:
        description: Relations
        items:
          $ref: '#/definitions/domains.UserRoles'
        type: array
    type: object
  domains.Tenant:
    properties:
      businessProfile:
        $ref: '#/definitions/domains.BusinessProfile'
      createdAt:
        type: string
      isActive:
        type: boolean
      role:
        type: string
      tenantID:
        type: string
      updatedAt:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/domains.Users'
        description: Relations
      userID:
        type: string
    type: object
  domains.TenantApprovalLogs:
    properties:
      action:
        type: string
      actionBy:
        type: string
      actor:
        $ref: '#/definitions/domains.Users'
      createdAt:
        type: string
      id:
        type: string
      updatedAt:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/domains.Users'
        description: Relations
      userID:
        type: string
    type: object
  domains.UserRoles:
    properties:
      role:
        $ref: '#/definitions/domains.Roles'
      roleID:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/domains.Users'
        description: Relations
      userID:
        type: string
    type: object
  domains.Users:
    properties:
      createdAt:
        type: string
      email:
        type: string
      gender:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      password:
        type: string
      tenant:
        allOf:
        - $ref: '#/definitions/domains.Tenant'
        description: Relations
      tenantApprovalLogs:
        items:
          $ref: '#/definitions/domains.TenantApprovalLogs'
        type: array
      tenantSchema:
        type: string
      updatedAt:
        type: string
      userID:
        type: string
      userRoles:
        items:
          $ref: '#/definitions/domains.UserRoles'
        type: array
      username:
        type: string
    type: object
  helpers.ApiResponse:
    properties:
      code:
        type: integer
      data: {}
      success:
        type: boolean
    type: object
  pagination.Response:
    properties:
      data: {}
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  payment.CheckoutResponse:
    properties:
      invoice_id:
        type: string
      session_id:
        type: string
      session_url:
        type: string
    type: object
  payment.InvoiceResponse:
    properties:
      duration:
        type: string
      id:
        type: string
      invoice_number:
        type: string
      is_paid:
        type: boolean
      paid_at:
        type: string
      payment_status:
        type: string
      plan_name:
        type: string
      price:
        type: number
      service_expired_on:
        type: string
      service_start:
        type: string
      service_status:
        type: string
      session_url:
        type: string
    type: object
  plan.CreateRequest:
    properties:
      duration:
        minimum: 1
        type: integer
      is_active:
        type: boolean
      is_month:
        type: boolean
      name:
        maxLength: 100
        minLength: 1
        type: string
      price:
        minimum: 0
        type: number
    required:
    - duration
    - is_month
    - name
    - price
    type: object
  plan.Response:
    properties:
      created_at:
        type: string
      duration:
        type: integer
      id:
        type: string
      is_active:
        type: boolean
      is_month:
        type: boolean
      name:
        type: string
      price:
        type: number
      updated_at:
        type: string
    type: object
  plan.UpdateRequest:
    properties:
      duration:
        minimum: 1
        type: integer
      is_active:
        type: boolean
      is_month:
        type: boolean
      name:
        maxLength: 100
        minLength: 1
        type: string
      price:
        minimum: 0
        type: number
    type: object
  product_category.CreateProductCategoryRequest:
    properties:
      description:
        maxLength: 100
        type: string
      is_visible:
        type: boolean
      name:
        maxLength: 100
        type: string
    required:
    - name
    type: object
  product_category.ProductCategoryDetailResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_visible:
        type: boolean
      name:
        type: string
      products:
        items:
          $ref: '#/definitions/product_category.ProductForCategoryResponse'
        type: array
      total_product:
        type: integer
      updated_at:
        type: string
    type: object
  product_category.ProductCategoryResponse:
    properties:
      id:
        type: string
      is_visible:
        type: boolean
      name:
        type: string
      total_product:
        type: integer
    type: object
  product_category.ProductForCategoryResponse:
    properties:
      id:
        type: string
      images:
        items:
          $ref: '#/definitions/product_category.ProductImageResponse'
        type: array
      is_visible:
        type: boolean
      name:
        type: string
    type: object
  product_category.ProductImageResponse:
    properties:
      id:
        type: string
      image:
        type: string
    type: object
  product_category.UpdateProductCategoryRequest:
    properties:
      description:
        maxLength: 100
        type: string
      is_visible:
        type: boolean
      name:
        maxLength: 100
        type: string
    required:
    - name
    type: object
  setting.GroupResponse:
    properties:
      group_name:
        type: string
      sub_groups:
        items:
          $ref: '#/definitions/setting.SubgroupResponse'
        type: array
    type: object
  setting.Response:
    properties:
      name:
        type: string
      value:
        type: string
    type: object
  setting.SubgroupResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/setting.Response'
        type: array
      sub_group_name:
        type: string
    type: object
  setting.UpdateBySubgroupRequest:
    properties:
      settings:
        items:
          $ref: '#/definitions/setting.UpdateSettingItem'
        type: array
    required:
    - settings
    type: object
  setting.UpdateSettingItem:
    properties:
      name:
        type: string
      value:
        type: string
    required:
    - name
    - value
    type: object
  subs.ActivePlanInfo:
    properties:
      duration:
        type: string
      plan_name:
        type: string
      tenant_plan_id:
        type: string
      token_usage:
        $ref: '#/definitions/subs.TokenUsage'
      valid_from:
        type: string
      valid_until:
        type: string
    type: object
  subs.Response:
    properties:
      active_plans:
        items:
          $ref: '#/definitions/subs.ActivePlanInfo'
        type: array
      current_token_usage:
        $ref: '#/definitions/subs.TokenUsage'
      is_free:
        type: boolean
      message:
        type: string
    type: object
  subs.TokenUsage:
    properties:
      total_cost:
        type: number
      total_tokens:
        description: -1 = unlimited
        type: integer
      used_tokens:
        type: integer
    type: object
  user.BusinessProfileResponse:
    properties:
      address:
        type: string
      business_name:
        type: string
      id:
        type: string
      phone:
        type: string
    type: object
  user.ChangePwRequest:
    properties:
      confirm_password:
        type: string
      current_password:
        maxLength: 100
        minLength: 6
        type: string
      new_password:
        maxLength: 100
        minLength: 6
        type: string
    required:
    - confirm_password
    - current_password
    - new_password
    type: object
  user.CreateSuperAdminRequest:
    properties:
      email:
        type: string
      gender:
        enum:
        - Male
        - Female
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
      username:
        maxLength: 150
        minLength: 3
        type: string
    required:
    - email
    - gender
    - password
    - username
    type: object
  user.CreateUserRequest:
    properties:
      address:
        maxLength: 255
        type: string
      business_name:
        maxLength: 150
        type: string
      email:
        type: string
      gender:
        enum:
        - Male
        - Female
        type: string
      name:
        maxLength: 150
        minLength: 1
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
      phone:
        maxLength: 20
        type: string
      role_id:
        type: string
      username:
        maxLength: 150
        minLength: 3
        type: string
    required:
    - email
    - gender
    - name
    - password
    - role_id
    - username
    type: object
  user.EditUserDataRequest:
    properties:
      address:
        maxLength: 255
        type: string
      business_name:
        maxLength: 150
        type: string
      email:
        type: string
      gender:
        enum:
        - Male
        - Female
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 150
        minLength: 1
        type: string
      phone:
        maxLength: 20
        type: string
      role_id:
        type: string
      username:
        maxLength: 150
        minLength: 3
        type: string
    type: object
  user.LoginRequest:
    properties:
      password:
        maxLength: 100
        minLength: 6
        type: string
      username_or_email:
        maxLength: 150
        minLength: 3
        type: string
    required:
    - password
    - username_or_email
    type: object
  user.LoginResponse:
    properties:
      access_token:
        type: string
      user_data:
        $ref: '#/definitions/user.Response'
    type: object
  user.Response:
    properties:
      email:
        type: string
      gender:
        type: string
      name:
        type: string
      role:
        type: string
      tenant:
        $ref: '#/definitions/user.TenantResponse'
      user_id:
        type: string
      username:
        type: string
    type: object
  user.SingleResponse:
    properties:
      address:
        type: string
      business_name:
        type: string
      email:
        type: string
      gender:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      phone:
        type: string
      role:
        type: string
      tenant_schema:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  user.TenantResponse:
    properties:
      business_profile:
        $ref: '#/definitions/user.BusinessProfileResponse'
      is_active:
        type: boolean
      role:
        type: string
      tenant_id:
        type: string
    type: object
  user.UpdateProfileNonClientRequest:
    properties:
      email:
        type: string
      gender:
        enum:
        - Male
        - Female
        type: string
      name:
        maxLength: 150
        minLength: 1
        type: string
      username:
        maxLength: 150
        minLength: 3
        type: string
    type: object
  user.UpdateProfileRequest:
    properties:
