  /client/{client_id}/chats/{platform}:
    get:
      description: |-
        SSE stream. Sends event:init with full conversation list on connect, then event:update on any new activity.
        Auth: Bearer token in Authorization header, OR ?token= query param (for browser EventSource).
      parameters:
      - description: Client ID (UUID)
        in: path
        name: client_id
        required: true
        type: string
      - description: Platform (telegram|whatsapp)
        in: path
        name: platform
        required: true
        type: string
      - description: JWT token (use when EventSource cannot set Authorization header)
        in: query
        name: token
        type: string
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Conversations per page (default 50)
        in: query
        name: limit
        type: integer
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream — event:init | event:update | comment:heartbeat
          schema:
            type: string
        "401":
          description: event:error
          schema:
            type: string
      summary: List conversations (SSE)
      tags:
      - Chat
  /client/{client_id}/chats/{platform}/{guest_id}:
    get:
      description: |-
        SSE stream. On connect sends event:init with guest info + latest N messages (DESC, newest first).
        Stays connected and streams event:message for new incoming messages.
        **Lazy load older messages**: reconnect with ?before_id=<oldest_message_id> to get the previous batch.
        When before_id is set the connection closes after delivering the batch (no streaming needed).
        Auth: Bearer token in Authorization header, OR ?token= query param (for browser EventSource).
      parameters:
      - description: Client ID (UUID)
        in: path
        name: client_id
        required: true
        type: string
      - description: Platform (telegram|whatsapp)
        in: path
        name: platform
        required: true
        type: string
      - description: Guest ID (UUID)
        in: path
        name: guest_id
        required: true
        type: string
      - description: JWT token (for browser EventSource)
        in: query
        name: token
        type: string
      - description: 'Cursor: fetch messages older than this message ID (lazy load)'
        in: query
        name: before_id
        type: string
      - description: Messages per batch (default 50, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream — event:init | event:message | comment:heartbeat
          schema:
            type: string
        "401":
          description: event:error
          schema:
            type: string
        "404":
          description: event:error
          schema:
            type: string
      summary: Conversation detail — messages + real-time (SSE)
      tags:
      - Chat
