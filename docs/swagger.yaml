host: data.ai-dia.com
info:
  contact: {}
  description: REST API for AI-Dia application
  title: AI-Dia API
  version: "1.0"
paths:
  /api/v1/internal/telegram/{schema}/ai-context:
    get:
      description: Returns AI prompts (5 sections) + live products + delivery zones
        for a tenant. Called by n8n to build the full AI prompt.
      parameters:
      - description: Tenant Schema
        in: path
        name: schema
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Get AI Context for Schema (Internal API for n8n)
      tags:
      - Internal
  /api/v1/webhook/telegram/{schema}:
    post:
      consumes:
      - application/json
